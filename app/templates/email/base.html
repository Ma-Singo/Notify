<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ subject | default(app_name) }}</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #1a1a2e; padding: 32px 40px; text-align: center; }
    .header h1 { margin: 0; color: #e94560; font-size: 24px; letter-spacing: 1px; }
    .body { padding: 40px; color: #333; line-height: 1.7; }
    .body h2 { color: #1a1a2e; margin-top: 0; }
    .btn { display: inline-block; margin-top: 24px; padding: 14px 32px; background: #e94560; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; }
    .footer { background: #f4f6f9; padding: 24px 40px; text-align: center; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header"><h1>{{ app_name }}</h1></div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      &copy; {{ app_name }}. All rights reserved.<br/>
      You're receiving this because you have an account with us.
    </div>
  </div>
</body>
</html>
